<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現況照片整理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei",sans-serif;background:#f0f2f5;min-height:100vh;padding:32px 24px}
.hero{text-align:center;margin-bottom:40px}
.hero h1{font-size:1.8rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
.hero p{color:#666;font-size:.95rem}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:800px;margin:0 auto}
@media(max-width:600px){.tools{grid-template-columns:1fr}}
.tool-card{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center;cursor:pointer;transition:.2s;text-decoration:none;color:inherit;display:block}
.tool-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.14)}
.tool-icon{font-size:3rem;margin-bottom:16px}
.tool-num{display:inline-block;background:#e3f2fd;color:#1565c0;font-weight:700;font-size:.8rem;padding:3px 10px;border-radius:12px;margin-bottom:12px}
.tool-card h2{font-size:1.15rem;font-weight:700;color:#222;margin-bottom:8px}
.tool-card p{font-size:.85rem;color:#666;line-height:1.6}
.arrow{color:#1976d2;font-size:1.5rem;margin-top:20px}
.flow{text-align:center;margin:32px auto 0;max-width:800px;color:#888;font-size:.85rem}
.flow-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.flow-step{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:8px 16px;font-size:.82rem;color:#444}
.flow-arrow{color:#aaa;font-size:1.2rem}
</style>
</head>
<body>
<div class="hero">
  <h1>🏗 現況照片整理系統</h1>
  <p>鑑定報告書照片自動識別分類與 Word 報告產出</p>
</div>

<div class="tools">
  <a class="tool-card" href="classify.html">
    <div class="tool-icon">🔍</div>
    <div class="tool-num">工具 1</div>
    <h2>照片識別分類</h2>
    <p>上傳多張現況照片<br>OCR 自動辨識圖片內地址文字<br>依縣市/路段/門牌分類整理<br>輸出分類資料夾 ZIP</p>
    <div class="arrow">→</div>
  </a>

  <a class="tool-card" href="report.html">
    <div class="tool-icon">📄</div>
    <div class="tool-num">工具 2</div>
    <h2>Word 鑑定報告產出</h2>
    <p>上傳已分類的地址照片<br>自動產出紅框表格格式 Word<br>照片高度 9cm、每頁 2 張<br>新北市工程顧問公會標準格式</p>
    <div class="arrow">→</div>
  </a>
</div>

<div class="flow">
  <div style="margin-bottom:12px;font-size:.8rem;color:#aaa">建議流程</div>
  <div class="flow-row">
    <div class="flow-step">📷 上傳現況照片</div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">🔍 工具1 識別分類</div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">💾 下載整理好的照片</div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">📄 工具2 產出 Word</div>
  </div>
</div>
</body>
</html>
